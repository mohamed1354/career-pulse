<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Pulse | استمارة البيانات المطورة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans Arabic', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .step-circle {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .step-active {
            background-color: #06b6d4;
            color: white;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.5);
            transform: scale(1.1);
        }
        .step-done {
            background-color: #10b981;
            color: white;
        }
        .form-section { display: none; }
        .form-section.active { 
            display: block; 
            animation: slideUp 0.4s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        input:focus, textarea:focus, select:focus {
            border-color: #06b6d4 !important;
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1) !important;
        }
    </style>
</head>
<body class="py-6 px-4">

    <!-- Header -->
    <div class="max-w-2xl mx-auto text-center mb-8">
        <div class="inline-block p-3 bg-cyan-500 rounded-2xl shadow-lg shadow-cyan-500/30 mb-4">
            <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
            </svg>
        </div>
        <h1 class="text-3xl font-bold text-white mb-2">كاريير بلس</h1>
        <p class="text-slate-400">نحول خبراتك إلى سيرة ذاتية احترافية</p>
    </div>

    <!-- Main Card -->
    <div class="max-w-2xl mx-auto glass-card rounded-3xl shadow-2xl overflow-hidden mb-10">
        
        <!-- Progress Stepper -->
        <div class="px-6 pt-8 pb-4 border-b border-gray-100">
            <div class="flex justify-between items-center relative">
                <div class="absolute top-1/2 left-0 w-full h-0.5 bg-gray-200 -z-10 transform -translate-y-1/2"></div>
                <div class="step-circle w-10 h-10 rounded-full bg-white border-2 border-gray-200 flex items-center justify-center font-bold text-gray-400 step-active" id="dot-1">1</div>
                <div class="step-circle w-10 h-10 rounded-full bg-white border-2 border-gray-200 flex items-center justify-center font-bold text-gray-400" id="dot-2">2</div>
                <div class="step-circle w-10 h-10 rounded-full bg-white border-2 border-gray-200 flex items-center justify-center font-bold text-gray-400" id="dot-3">3</div>
                <div class="step-circle w-10 h-10 rounded-full bg-white border-2 border-gray-200 flex items-center justify-center font-bold text-gray-400" id="dot-4">4</div>
            </div>
        </div>

        <form id="mainForm" class="p-8">
            
            <!-- Section 1: Contact -->
            <div class="form-section active" id="sec-1">
                <h3 class="text-xl font-bold text-slate-800 mb-6">المعلومات الشخصية</h3>
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-bold text-slate-600 mb-2">الاسم الكامل *</label>
                        <input type="text" name="name" required class="w-full bg-gray-50 border border-gray-200 p-4 rounded-xl outline-none transition-all" placeholder="أدخل اسمك كما سيظهر في الـ CV">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-600 mb-2">المسمى الوظيفي المستهدف *</label>
                        <input type="text" name="title" required class="w-full bg-gray-50 border border-gray-200 p-4 rounded-xl outline-none transition-all" placeholder="مثلاً: محاسب مالي / شيف عمومي">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-600 mb-2">رقم الموبايل *</label>
                        <input type="tel" name="phone" required class="w-full bg-gray-50 border border-gray-200 p-4 rounded-xl outline-none transition-all" placeholder="012XXXXXXXX">
                    </div>
                </div>
            </div>

            <!-- Section 2: Experience -->
            <div class="form-section" id="sec-2">
                <h3 class="text-xl font-bold text-slate-800 mb-2">الخبرات العملية</h3>
                <p class="text-sm text-slate-500 mb-6">اكتب تفاصيل أهم وظيفة قمت بها</p>
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-bold text-slate-600 mb-2">آخر شركة عملت بها والمدة</label>
                        <input type="text" name="company" class="w-full bg-gray-50 border border-gray-200 p-4 rounded-xl outline-none" placeholder="مثال: فندق ماريوت (2021 - 2024)">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-600 mb-2">أهم الإنجازات (استخدم لغة الأرقام)</label>
                        <textarea name="achieve" rows="4" class="w-full bg-gray-50 border border-gray-200 p-4 rounded-xl outline-none" placeholder="مثال: حققت زيادة في المبيعات بنسبة 20%، قمت بتدريب 5 موظفين جدد.."></textarea>
                    </div>
                </div>
            </div>

            <!-- Section 3: Skills & Edu -->
            <div class="form-section" id="sec-3">
                <h3 class="text-xl font-bold text-slate-800 mb-6">التعليم والمهارات</h3>
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-bold text-slate-600 mb-2">المؤهل الدراسي</label>
                        <input type="text" name="edu" class="w-full bg-gray-50 border border-gray-200 p-4 rounded-xl outline-none" placeholder="مثلاً: بكالوريوس نظم معلومات">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-600 mb-2">أهم مهاراتك (افصل بينها بفاصلة)</label>
                        <input type="text" name="skills" class="w-full bg-gray-50 border border-gray-200 p-4 rounded-xl outline-none" placeholder="القيادة، مايكروسوفت أوفيس، حل المشكلات">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-600 mb-2">ستايل التصميم المفضل</label>
                        <select name="style" class="w-full bg-gray-50 border border-gray-200 p-4 rounded-xl outline-none">
                            <option value="Modern">عصري (Modern)</option>
                            <option value="Classic">رسمي (Classic)</option>
                            <option value="Creative">إبداعي (Creative)</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Section 4: Send -->
            <div class="form-section" id="sec-4">
                <div class="text-center py-6">
                    <div class="w-20 h-20 bg-green-100 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6">
                        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                    </div>
                    <h3 class="text-2xl font-bold text-slate-800 mb-3">البيانات جاهزة!</h3>
                    <p class="text-slate-500 mb-8">عند الضغط على الزر، سيتم فتح الواتساب لإرسال بياناتك إلى كاريير بلس للبدء في التصميم.</p>
                    
                    <button type="button" onclick="sendToWhatsApp()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-5 rounded-2xl shadow-xl shadow-green-200 transition-all flex items-center justify-center gap-3">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                        إرسال الطلب الآن
                    </button>
                </div>
            </div>

            <!-- Nav -->
            <div class="mt-10 flex justify-between items-center" id="navRow">
                <button type="button" id="backBtn" onclick="nextStep(-1)" class="text-slate-400 font-bold px-4 py-2 invisible">السابق</button>
                <button type="button" id="nextBtn" onclick="nextStep(1)" class="bg-slate-800 text-white px-10 py-4 rounded-xl font-bold shadow-lg hover:bg-slate-900 transition-all">متابعة</button>
            </div>

        </form>
    </div>

    <p class="text-center text-slate-500 text-sm italic mb-10">كاريير بلس - نبض جديد لمستقبلك المهني</p>

    <script>
        let current = 1;
        // رقم الواتساب الخاص بك
        const MY_WHATSAPP_NUMBER = "201028790152"; 

        function nextStep(n) {
            // Validation
            if (n === 1) {
                const inputs = document.querySelector(`#sec-${current}`).querySelectorAll('[required]');
                let valid = true;
                inputs.forEach(i => {
                    if(!i.value) { i.classList.add('border-red-500'); valid = false; }
                    else { i.classList.remove('border-red-500'); }
                });
                if(!valid) return;
            }

            document.getElementById(`sec-${current}`).classList.remove('active');
            document.getElementById(`dot-${current}`).classList.replace('step-active', 'step-done');
            
            current += n;
            
            document.getElementById(`sec-${current}`).classList.add('active');
            document.getElementById(`dot-${current}`).classList.add('step-active');
            
            updateUI();
        }

        function updateUI() {
            document.getElementById('backBtn').style.visibility = (current === 1 || current === 4) ? 'hidden' : 'visible';
            document.getElementById('nextBtn').style.display = (current === 4) ? 'none' : 'block';
            document.getElementById('nextBtn').innerText = (current === 3) ? 'إنهاء الطلب' : 'متابعة';
        }

        function sendToWhatsApp() {
            const form = document.getElementById('mainForm');
            const data = new FormData(form);
            
            let message = `*طلب سيرة ذاتية جديد - Career Pulse*%0A`;
            message += `---------------------------------%0A`;
            message += `*الاسم:* ${data.get('name')}%0A`;
            message += `*الوظيفة المستهدفة:* ${data.get('title')}%0A`;
            message += `*رقم العميل:* ${data.get('phone')}%0A`;
            message += `*آخر شركة:* ${data.get('company') || 'غير مذكور'}%0A`;
            message += `*الإنجازات:* ${data.get('achieve') || 'غير مذكور'}%0A`;
            message += `*التعليم:* ${data.get('edu') || 'غير مذكور'}%0A`;
            message += `*المهارات:* ${data.get('skills') || 'غير مذكور'}%0A`;
            message += `*الستايل المختار:* ${data.get('style')}%0A`;
            message += `---------------------------------%0A`;
            message += `_تم الإرسال من خلال استمارة كاريير بلس_`;

            // Open WhatsApp with the message
            const url = `https://wa.me/${MY_WHATSAPP_NUMBER}?text=${message}`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
